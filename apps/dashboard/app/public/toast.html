<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>toast</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        user-select: none;
        -webkit-user-select: none;
        pointer-events: none;
      }
      #stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
      }
      .toast-msg {
        background: linear-gradient(135deg, #ffc107, #ff8a00);
        color: #1a1303;
        padding: 10px 18px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 13px;
        line-height: 1.35;
        max-width: 520px;
        text-align: center;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.3);
        word-wrap: break-word;
        opacity: 0;
        transform: translateY(-12px);
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .toast-msg.in {
        opacity: 1;
        transform: translateY(0);
      }
      .toast-msg.out {
        opacity: 0;
        transform: translateY(-8px);
      }
    </style>
  </head>
  <body>
    <div id="stack"></div>
  </body>
</html>
