<!DOCTYPE html>
<html>
<head>
    <style>
        body { padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5; }
        .json-editor { width: 100%; height: 350px; font-family: monospace; font-size: 12px; white-space: pre; overflow: auto; border: 1px solid #ccc; padding: 10px; background-color: white; border-radius: 5px; box-sizing: border-box; }
        .info-text { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.4; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 15px 40px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; font-weight: 500; margin-top: 10px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <header class="homey-header">
        <h1 class="homey-title" data-i18n="pair.circadian_light_group.configure_title">Configure Circadian Light Group</h1>
        <p class="homey-subtitle" data-i18n="pair.circadian_light_group.configure_subtitle">Review and edit the generated JSON configuration.</p>
    </header>

    <div class="homey-view-content">
        <div class="input-group">
            <label data-i18n="pair.circadian_light_group.device_name">Device Name</label>
            <input type="text" id="device-name" value="Circadian Light Group" placeholder="Living Room Circadian Lights">
        </div>
        <p class="info-text" data-i18n="pair.circadian_light_group.external_hint">
            Set outdoorLight.provider to external_value if a Flow should push computed lux values into this device.
        </p>
        <textarea id="json-editor" class="json-editor"></textarea>
    </div>

    <div class="homey-view-buttons">
        <button id="create-button" data-i18n="pair.circadian_light_group.create_device">Create Device</button>
    </div>

    <script type="text/javascript">
        const jsonEditor = document.getElementById('json-editor');
        const deviceNameInput = document.getElementById('device-name');
        const createButton = document.getElementById('create-button');

        function t(key, fallback) {
            try {
                if (typeof Homey !== 'undefined' && typeof Homey.__ === 'function') return Homey.__(key) || fallback;
            } catch (e) {}
            return fallback;
        }

        function applyTranslations() {
            if (typeof Homey === 'undefined' || typeof Homey.__ !== 'function') return;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.getAttribute('data-i18n'), el.textContent);
            });
            deviceNameInput.placeholder = t('pair.circadian_light_group.device_name_placeholder', 'Living Room Circadian Lights');
            deviceNameInput.value = t('pair.circadian_light_group.title', 'Circadian Light Group');
        }

        function onHomeyReady() {
            Homey.setTitle(t('pair.circadian_light_group.configure_title', 'Configure Circadian Light Group'));
            applyTranslations();
            Homey.emit('get_generated_json', {}, function(err, result) {
                if (err) {
                    jsonEditor.value = '// ' + t('pair.error_loading', 'Error loading') + ': ' + err.message;
                    return;
                }
                jsonEditor.value = typeof result === 'object' ? JSON.stringify(result, null, 2) : result;
            });
        }

        function waitForHomey() {
            if (typeof Homey !== 'undefined') onHomeyReady();
            else setTimeout(waitForHomey, 100);
        }
        waitForHomey();

        createButton.addEventListener('click', function() {
            createButton.disabled = true;
            const name = deviceNameInput.value.trim();
            const jsonContent = jsonEditor.value;

            if (!name) {
                Homey.alert(t('pair.circadian_light_group.error_name_required', 'Please enter a device name.'));
                createButton.disabled = false;
                return;
            }

            try {
                JSON.parse(jsonContent);
            } catch (error) {
                Homey.alert(t('pair.circadian_light_group.error_invalid_json', 'Invalid JSON:') + '\n' + error.message);
                createButton.disabled = false;
                return;
            }

            Homey.emit('create_device', {
                name,
                json_data: jsonContent
            }, function(err, deviceData) {
                if (err) {
                    Homey.alert(err.message || t('pair.circadian_light_group.error_preparing_device', 'Error preparing device'));
                    createButton.disabled = false;
                    return;
                }

                Homey.createDevice(deviceData, function(createErr) {
                    if (createErr) {
                        Homey.alert(createErr.message || t('pair.circadian_light_group.error_creating_device', 'Error creating device'));
                        createButton.disabled = false;
                        return;
                    }
                    Homey.done();
                });
            });
        });
    </script>
</body>
</html>
