<!DOCTYPE html>
<html>
<head>
    <style>
        body { padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5; }
        .homey-header { margin-bottom: 20px; }
        .homey-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .homey-subtitle { font-size: 16px; color: #666; }
        .zone-list { max-height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 15px; background: white; border-radius: 5px; }
        .zone-item { padding: 5px 0; display: flex; align-items: center; }
        .zone-item label { margin-left: 10px; cursor: pointer; }
        .info-text { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.4; }
        .field-row { margin-bottom: 15px; }
        button { padding: 15px 40px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; font-weight: 500; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <header class="homey-header">
        <h1 class="homey-title" data-i18n="pair.circadian_light_group.select_scope_title">Select Scope</h1>
        <p class="homey-subtitle" data-i18n="pair.circadian_light_group.select_scope_subtitle">Choose which zones contain lights for this group.</p>
    </header>

    <div class="homey-view-content">
        <p class="info-text" data-i18n="pair.circadian_light_group.select_scope_description">Select Whole House to scan all devices, or choose one or more zones.</p>
        <div class="field-row">
            <label><input type="checkbox" id="scope-whole-house" checked> <span data-i18n="pair.circadian_light_group.whole_house">Whole House</span></label>
        </div>
        <div id="scope-zones-container" class="zone-list" style="display: none;">
            <p data-i18n="pair.circadian_light_group.loading_zones">Loading zones...</p>
        </div>
    </div>

    <div class="homey-view-buttons">
        <button id="scope-next-button" data-i18n="pair.next">Next</button>
    </div>

    <script type="text/javascript">
    (function () {
        const wholeHouseCheckbox = document.getElementById('scope-whole-house');
        const zonesContainer = document.getElementById('scope-zones-container');
        const nextButton = document.getElementById('scope-next-button');
        let zones = [];

        function t(key, fallback) {
            try {
                if (typeof Homey !== 'undefined' && typeof Homey.__ === 'function') return Homey.__(key) || fallback;
            } catch (e) {}
            return fallback;
        }

        function applyTranslations() {
            if (typeof Homey === 'undefined' || typeof Homey.__ !== 'function') return;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.getAttribute('data-i18n'), el.textContent);
            });
        }

        function onHomeyReady() {
            Homey.setTitle(t('pair.circadian_light_group.title', 'Circadian Light Group'));
            applyTranslations();
            Homey.emit('get_zones', {}, function(err, result) {
                if (err) {
                    Homey.alert(err.message || t('pair.circadian_light_group.error_fetching_zones', 'Error fetching zones'));
                    return;
                }
                zones = Array.isArray(result) ? result : [];
                renderZones();
            });
        }

        function waitForHomey() {
            if (typeof Homey !== 'undefined') onHomeyReady();
            else setTimeout(waitForHomey, 100);
        }
        waitForHomey();

        wholeHouseCheckbox.addEventListener('change', function() {
            zonesContainer.style.display = this.checked ? 'none' : 'block';
        });

        function renderZones() {
            zonesContainer.innerHTML = '';
            if (zones.length === 0) {
                zonesContainer.innerHTML = '<p style="padding:10px;">' + t('pair.circadian_light_group.no_zones_found', 'No zones found.') + '</p>';
                return;
            }

            zones.forEach(zone => {
                const div = document.createElement('div');
                div.className = 'zone-item';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.value = zone.id;
                checkbox.id = 'zone-' + zone.id;
                const label = document.createElement('label');
                label.htmlFor = checkbox.id;
                label.innerText = zone.name;
                div.appendChild(checkbox);
                div.appendChild(label);
                zonesContainer.appendChild(div);
            });
        }

        nextButton.addEventListener('click', function() {
            nextButton.disabled = true;
            nextButton.innerText = t('pair.circadian_light_group.scanning', 'Scanning...');

            const selectedZones = [];
            if (!wholeHouseCheckbox.checked) {
                zonesContainer.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => selectedZones.push(cb.value));
                if (selectedZones.length === 0) {
                    Homey.alert(t('pair.circadian_light_group.error_select_zone', 'Please select at least one zone.'));
                    nextButton.disabled = false;
                    nextButton.innerText = t('pair.next', 'Next');
                    return;
                }
            }

            let responded = false;
            const watchdog = setTimeout(function() {
                if (responded) return;
                responded = true;
                nextButton.disabled = false;
                nextButton.innerText = t('pair.next', 'Next');
                Homey.alert('Scan timeout: handler ran but client never received the response. Check app log for "generate_snapshot returning".');
            }, 30000);

            Homey.emit('pair_debug', 'select_scope: emitting generate_snapshot', function() {});

            Homey.emit('generate_snapshot', {
                wholeHouse: wholeHouseCheckbox.checked,
                zones: selectedZones
            }, function(err, result) {
                if (responded) return;
                responded = true;
                clearTimeout(watchdog);
                nextButton.disabled = false;
                nextButton.innerText = t('pair.next', 'Next');

                Homey.emit('pair_debug', 'select_scope: generate_snapshot callback err=' + (err ? err.message : 'none') + ' result=' + JSON.stringify(result || null), function() {});

                if (err) {
                    Homey.alert(err.message || t('pair.circadian_light_group.error_scanning_lights', 'Error scanning lights'));
                    return;
                }
                const navInfo = 'nextView=' + typeof Homey.nextView + ' showView=' + typeof Homey.showView + ' done=' + typeof Homey.done;
                Homey.emit('pair_debug', 'select_scope: navigation api: ' + navInfo, function() {});
                try {
                    if (typeof Homey.nextView === 'function') {
                        Homey.emit('pair_debug', 'select_scope: calling nextView()', function() {});
                        Homey.nextView();
                    } else if (typeof Homey.showView === 'function') {
                        Homey.emit('pair_debug', 'select_scope: calling showView(select_devices)', function() {});
                        Homey.showView('select_devices');
                    } else {
                        Homey.emit('pair_debug', 'select_scope: NO navigation function available!', function() {});
                    }
                } catch (e) {
                    Homey.emit('pair_debug', 'select_scope: navigation threw: ' + (e && e.message), function() {});
                }
            });
        });
    })();
    </script>
</body>
</html>
